<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Esteban Jose Puello Fuentes - Solution Architect</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Solution Architect with 10+ years of experience designing and delivering scalable cloud and serverless architectures">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="./slyte.css" />
  <style>
    :root {
      --saffron_mango: #DEC647;
      --pinkish_tan: #C9A38D;
      --brownish: #9D6B4C;
      --judge-gray: #534339;
      --white: #FFFCF3;
      --background-color: var(--judge-gray);
      --cover-text-color: var(--white);
      --cover-background-color: var(--brownish)
    }
    
    /* Mermaid chart styling */
    .mermaid {
      text-align: center;
      margin: 20px 0;
    }
    
    /* Ensure mermaid diagrams are responsive */
    .mermaid svg {
      max-width: 100%;
      height: auto;
    }
    
    /* Mermaid diagram styling with brand colors and proper contrast */
    /* Text colors - light for dark backgrounds */
    .mermaid .titleText,
    .mermaid text.titleText,
    .mermaid tspan.titleText {
      fill: #DEC647 !important;
      font-weight: bold !important;
    }
    
    /* Node labels and general text */
    .mermaid .nodeLabel,
    .mermaid text.nodeLabel,
    .mermaid .node text,
    .mermaid text,
    .mermaid tspan {
      fill: #FFFCF3 !important;
    }
    
    /* Section titles for timelines */
    .mermaid .sectionTitle,
    .mermaid .timelineTitle {
      fill: #DEC647 !important;
      font-weight: bold !important;
    }
    
    /* Node backgrounds - dark for contrast with light text */
    .mermaid .node rect,
    .mermaid .node circle,
    .mermaid .node ellipse,
    .mermaid .node polygon,
    .mermaid .node path {
      fill: #534339 !important;
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    /* Timeline section backgrounds */
    .mermaid .section0,
    .mermaid .section1,
    .mermaid .section2,
    .mermaid .section3 {
      fill: #534339 !important;
    }
    
    /* Timeline alternate sections with slightly lighter shade */
    .mermaid .section1,
    .mermaid .section3 {
      fill: #6b5748 !important;
    }
    
    /* Timeline lines and markers */
    .mermaid .timeline-line {
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    /* Pie chart slices - use brand colors */
    .mermaid .pieCircle {
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    .mermaid .pieTitleText {
      fill: #DEC647 !important;
      font-weight: bold !important;
    }
    
    .mermaid .slice {
      stroke: #534339 !important;
      stroke-width: 1px !important;
    }
    
    /* Flowchart specific */
    .mermaid .edgePath .path {
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    .mermaid .edgeLabel {
      background-color: #534339 !important;
      fill: #FFFCF3 !important;
    }
    
    /* Gantt chart */
    .mermaid .task {
      fill: #534339 !important;
      stroke: #DEC647 !important;
    }
    
    .mermaid .taskText {
      fill: #FFFCF3 !important;
    }
    
    .mermaid .today {
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    /* Mindmap specific - improve readability */
    .mermaid .mindmap-node {
      fill: #534339 !important;
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    .mermaid .mindmap-node text,
    .mermaid .mindmap-node tspan {
      fill: #FFFCF3 !important;
      font-size: 14px !important;
    }
    
    .mermaid .mindmap-root {
      fill: #DEC647 !important;
      stroke: #534339 !important;
      stroke-width: 3px !important;
    }
    
    .mermaid .mindmap-root text,
    .mermaid .mindmap-root tspan {
      fill: #534339 !important;
      font-weight: bold !important;
      font-size: 16px !important;
    }
    
    /* Mindmap connection lines */
    .mermaid .mindmap-link {
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    /* Pie chart specific - improve readability */
    .mermaid .pie-sector {
      stroke: #534339 !important;
      stroke-width: 2px !important;
    }
    
    .mermaid .pie-label {
      fill: #FFFCF3 !important;
      font-size: 12px !important;
      font-weight: bold !important;
    }
    
    .mermaid .pie-title-text {
      fill: #DEC647 !important;
      font-size: 18px !important;
      font-weight: bold !important;
    }
    
    /* Flowchart specific - improve readability */
    .mermaid .flowchart-link {
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    .mermaid .edgeLabel rect {
      fill: #534339 !important;
      stroke: #DEC647 !important;
    }
    
    .mermaid .edgeLabel text {
      fill: #FFFCF3 !important;
      font-size: 12px !important;
    }
    
    /* General node improvements */
    .mermaid .node rect,
    .mermaid .node circle,
    .mermaid .node ellipse,
    .mermaid .node polygon {
      fill: #534339 !important;
      stroke: #DEC647 !important;
      stroke-width: 2px !important;
    }
    
    .mermaid .node .label {
      color: #FFFCF3 !important;
    }
    
    .mermaid .node .label text {
      fill: #FFFCF3 !important;
      font-size: 14px !important;
    }
    
    /* Subgraph styling */
    .mermaid .cluster rect {
      fill: rgba(222, 198, 71, 0.1) !important;
      stroke: #DEC647 !important;
      stroke-width: 1px !important;
    }
    
    .mermaid .cluster text {
      fill: #DEC647 !important;
      font-weight: bold !important;
    }
    
    /* Override bold text color */
    .markdown-section strong,
    .markdown-section b {
      color: #DEC647;
    }
    
    /* Print styles - hide sidebar and other UI elements */
    @media print {
      .sidebar,
      .sidebar-toggle,
      .docsify-copy-code-button,
      .github-corner,
      .app-nav,
      .print-button {
        display: none !important;
      }
      
      .content {
        left: 0 !important;
        margin-left: 0 !important;
        max-width: 100% !important;
      }
      
      body {
        overflow: visible !important;
      }
      
      .markdown-section {
        max-width: 100% !important;
        padding: 20px !important;
      }
    }
    
    /* Print button styling */
    .print-button {
      display: inline-block;
      margin: 10px 0 20px 0;
      padding: 10px 20px;
      background-color: #DEC647;
      color: #534339 !important;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    
    .print-button:hover {
      background-color: #c9b13f;
    }
    
    /* Table styling with brand colors */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
    }
    
    .markdown-section table tr:nth-child(2n) {
      background-color: rgba(222, 198, 71, 0.1); /* saffron_mango with 10% opacity */
    }
    
    .markdown-section table tr:nth-child(2n+1) {
      background-color: transparent;
    }
    
    .markdown-section table tr:hover {
      background-color: rgba(222, 198, 71, 0.25); /* saffron_mango with 25% opacity */
    }
    
    .markdown-section table th {
      background-color: #DEC647;
      color: #534339;
      font-weight: bold;
      border: 1px solid #9D6B4C;
      padding: 10px;
    }
    
    .markdown-section table td {
      border: 1px solid rgba(222, 198, 71, 0.3);
      padding: 10px;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  
  <!-- Mermaid.js -->
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  
  <script>
    // Initialize mermaid
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      logLevel: 'error',
      flowchart: {
        useMaxWidth: true,
        htmlLabels: true,
        curve: 'basis'
      },
      sequence: {
        useMaxWidth: true
      },
      gantt: {
        useMaxWidth: true
      },
      pie: {
        useMaxWidth: true
      },
      timeline: {
        useMaxWidth: true
      }
    });

    let num = 0;
    
    window.$docsify = {
      name: 'Esteban Puello',
      themeColor: '#DEC647',
      repo: 'https://github.com/eftech93',
      coverpage: 'coverpage.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === "mermaid") {
              return '<div class="mermaid" id="mermaid-' + num++ + '">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            // Re-render mermaid diagrams after each page load
            mermaid.run({
              querySelector: '.mermaid'
            }).catch(function(err) {
              console.error('Mermaid rendering error:', err);
            });
          });
        }
      ]
    }
  </script>
  
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>

</html>
